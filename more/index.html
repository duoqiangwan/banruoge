<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta name="theme-color" content="#1a1410">
<title>更多功能 · 般若阁</title>
<meta name="description" content="般若阁全部功能：为家人祈福、今日黄历、求灵签、八字精批、周公解梦、手相面相、宝宝起名、六爻占卜、静心禅坐、在线上香等。">
<link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path d='M32 6C22 6 12 12 10 22C8 32 14 44 24 50C28 53 30 56 31 60L32 62L33 60C34 56 36 53 40 50C50 44 56 32 54 22C52 12 42 6 32 6Z' fill='%23c9a05c' fill-opacity='0.3' stroke='%23c9a05c' stroke-width='1.6'/></svg>">
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  .page-title { font-size: 2.4rem; letter-spacing: 0.15em; margin: 0; }
  .page-sub { color: rgba(232,213,176,0.7); margin: 8px 0 0; font-size: 0.95rem; letter-spacing: 0.08em; }

  /* 功能网格 */
  .feature-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  @media (min-width:640px) { .feature-grid { grid-template-columns:repeat(3,1fr); } }
  @media (min-width:900px) { .feature-grid { grid-template-columns:repeat(4,1fr); } }

  .feature-card { display:flex; flex-direction:column; align-items:center; gap:10px; padding:24px 12px; text-decoration:none; color:inherit; text-align:center; transition:all 0.25s; position:relative; }
  .feature-card:hover { transform:translateY(-4px); border-color:rgba(201,160,94,0.5); box-shadow:0 8px 24px rgba(201,160,94,0.1); }
  .feature-icon-wrap { width:56px; height:56px; border-radius:14px; background:linear-gradient(135deg,rgba(201,160,94,0.18),rgba(201,160,94,0.06)); border:1px solid rgba(201,160,94,0.2); display:flex; align-items:center; justify-content:center; color:var(--gold); transition:all 0.25s; }
  .feature-card:hover .feature-icon-wrap { background:linear-gradient(135deg,rgba(201,160,94,0.3),rgba(201,160,94,0.12)); border-color:rgba(201,160,94,0.4); }
  .feature-name { font-size:1.05rem; color:var(--paper-dark); margin:0; }
  .feature-desc { font-size:0.78rem; color:var(--ink-muted); margin:0; line-height:1.6; }
  .feature-tag { position:absolute; top:8px; right:8px; }

  /* 底部信息 */
  .footer-info { text-align:center; padding:32px 0 16px; }
  .footer-version { font-size:0.85rem; color:var(--gold); margin:0 0 8px; }
  .footer-contact { font-size:0.8rem; color:var(--ink-muted); line-height:1.8; margin:0; }
  .footer-contact a { color:var(--gold); text-decoration:none; }
</style>
</head>
<body class="antialiased">
<main class="main-content">

  <!-- 页头 -->
  <section style="text-align:center;padding:24px 0 8px;" data-reveal>
    <h1 class="font-display gold-text-gradient page-title">更多功能</h1>
    <p class="page-sub">九大善门 · 一念清净</p>
    <div class="gold-divider" style="width:120px;margin:16px auto 0;"></div>
  </section>

  <!-- 功能网格 -->
  <section style="margin-top:24px;" data-reveal>
    <div class="feature-grid" id="featureGrid"></div>
  </section>

  <!-- 经典引言 -->
  <section style="margin-top:32px;" data-reveal>
    <div class="card" style="padding:32px 24px;text-align:center;">
      <div class="gold-divider" style="width:80px;margin:0 auto 16px;"></div>
      <p class="font-display" style="font-size:1.3rem;color:var(--gold-light);margin:0 0 8px;letter-spacing:0.1em;">诸恶莫作 · 众善奉行</p>
      <p style="font-size:0.9rem;color:rgba(232,213,176,0.75);line-height:2;margin:0;">命自我立，福自我求。<br>一切福田，不离方寸；从心而觅，感无不通。</p>
      <div class="gold-divider" style="width:80px;margin:16px auto 0;"></div>
    </div>
  </section>

  <!-- 底部信息 -->
  <section class="footer-info" data-reveal>
    <p class="footer-version">般若阁 · v1.0.0</p>
    <p class="footer-contact">
      联系我们：<a href="mailto:contact@banruoge.example">contact@banruoge.example</a><br>
      公众号：般若阁<br>
      <a href="/terms/">用户协议</a> · <a href="/privacy/">隐私说明</a> · <a href="/ai-notice/">AI 生成说明</a>
    </p>
    <p style="font-size:0.75rem;color:var(--ink-muted);margin-top:12px;line-height:1.8;">本站内容仅作传统文化参考，不替代医疗、法律、投资等专业意见</p>
  </section>

</main>

<script src="/js/app.js"></script>
<script src="/js/layout.js"></script>
<script>
(function(){
  var features = [
    { href:'/qifu/', icon:'heart', tag:'热门', name:'为家人祈福', desc:'点一盏灯，写下一份祝愿' },
    { href:'/almanac/', icon:'calendar', tag:'每日', name:'今日黄历', desc:'干支宜忌，传统择吉' },
    { href:'/lottery/', icon:'sparkles', tag:'', name:'求灵签', desc:'百支签文，一事一签' },
    { href:'/bazi/', icon:'compass', tag:'', name:'八字精批', desc:'立春真排盘，看命格根骨' },
    { href:'/dream/', icon:'moon', tag:'新增', name:'周公解梦', desc:'百梦皆有意，古今相参' },

    { href:'/more/', icon:'info', tag:'', name:'关于我们', desc:'了解般若阁的初心' }
  ];

  var iconPaths = {
    heart: '<path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/>',
    calendar: '<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/>',

    incense: '<path d="M12 2v6"/><path d="M9 8c0 2 3 2 3 0s3-2 3 0"/><path d="M6 14h12v6a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1z"/><path d="M6 14a6 6 0 0 1 12 0"/>',
    share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/>',
    info: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>'
  };

  var grid = document.getElementById('featureGrid');
  features.forEach(function(f, i){
    var card = document.createElement('a');
    card.href = f.href;
    card.className = 'card feature-card';
    card.setAttribute('data-reveal', '');
    card.setAttribute('data-delay', (i * 0.04).toFixed(2));

    var tagHtml = f.tag ? '<span class="tag feature-tag">' + f.tag + '</span>' : '';

    card.innerHTML =
      tagHtml +
      '<div class="feature-icon-wrap">' +
        '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + iconPaths[f.icon] + '</svg>' +
      '</div>' +
      '<p class="feature-name">' + f.name + '</p>' +
      '<p class="feature-desc">' + f.desc + '</p>';

    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
